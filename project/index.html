    <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<button class="theme-toggle lang-toggle" id="langToggle" title="切换语言" aria-label="切换语言" style="bottom:82px">
    <span id="langLabel">中</span>
</button>
<script>
(function() {
    var btn = document.getElementById('themeToggle');
    var sun = document.getElementById('iconSun');
    var moon = document.getElementById('iconMoon');
    var html = document.documentElement;

    function setTheme(t) {
        html.setAttribute('data-theme', t);
        sun.style.display = t === 'dark' ? 'none' : '';
        moon.style.display = t === 'dark' ? '' : 'none';
        localStorage.setItem('theme', t);
    }
    var saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);
    btn.addEventListener('click', function() {
        setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
})();


(function() {
    var btn = document.getElementById('langToggle');
    var label = document.getElementById('langLabel');
    if (!btn) return;
    var lang = localStorage.getItem('lang') || 'en';

    function setLang(l) {
        lang = l;
        label.textContent = l === 'zh' ? '中' : 'EN';
        localStorage.setItem('lang', l);
        document.querySelectorAll('[data-zh]').forEach(function(el) {
            var t = el.getAttribute('data-' + l);
            if (t !== null) el.textContent = t;
        });
        document.querySelectorAll('[data-zh-placeholder]').forEach(function(el) {
            var t = el.getAttribute('data-' + l + '-placeholder');
            if (t !== null) el.placeholder = t;
        });
    }
    setLang(lang);
    btn.addEventListener('click', function() { setLang(lang === 'zh' ? 'en' : 'zh'); });
})();
</script>
