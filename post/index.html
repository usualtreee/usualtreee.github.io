        function parseDate(dateStr) {
            var parts = dateStr.split('-');
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        }

        function getWeek(d) {
            var start = new Date(d.getFullYear(), 0, 1);
            var diff = (d - start) / 86400000;
            return Math.ceil((diff + start.getDay() + 1) / 7);
        }

        function pad(n) { return n < 10 ? '0' + n : String(n); }

        function groupBy(m) {
            var groups = {};
            posts.forEach(function(p) {
                var d = parseDate(p.date);
                var key;
                if (m === 'day') {
                    key = p.date;
                } else if (m === 'week') {
                    var w = getWeek(d);
                    key = d.getFullYear() + '-W' + pad(w);
                } else if (m === 'month') {
                    key = d.getFullYear() + '-' + pad(d.getMonth() + 1);
                } else {
                    key = String(d.getFullYear());
                }
                if (!groups[key]) groups[key] = [];
                groups[key].push(p);
            });
            var keys = Object.keys(groups).sort().reverse();
            return { keys: keys, groups: groups };
        }

        function formatHeader(key, m, count) {
            var lang = localStorage.getItem('lang') || 'en';
            var mo, d, yr, wk;
            if (lang === 'en') {
                if (m === 'day') {
                    var p = key.split('-');
                    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    return months[parseInt(p[1])-1] + ' ' + parseInt(p[2]) + ' · ' + count;
                } else if (m === 'week') {
                    var parts = key.split('-W');
                    return parts[0] + ' Wk' + parseInt(parts[1]) + ' · ' + count;
                } else if (m === 'month') {
                    var parts = key.split('-');
                    var months2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    return months2[parseInt(parts[1])-1] + ' ' + parts[0] + ' · ' + count;
                }
                return key + ' · ' + count + ' posts';
            }
            if (m === 'day') {
                var p = key.split('-');
                return parseInt(p[1]) + '月' + parseInt(p[2]) + '日 · ' + count + '篇';
            } else if (m === 'week') {
                var parts = key.split('-W');
                return parts[0] + '年 第' + parseInt(parts[1]) + '周 · ' + count + '篇';
            } else if (m === 'month') {
                var parts = key.split('-');
                return parts[0] + '年' + parseInt(parts[1]) + '月 · ' + count + '篇';
            }
            return key + '年 · ' + count + '篇文章';
        }

        function render() {
            var data = groupBy(mode);
            var html = '';
            if (data.keys.length === 0) {
                var emptyZh = '还没有文章', emptyEn = 'No posts yet';
                var lang = localStorage.getItem('lang') || 'en';
                html = '<div class="postlist-empty"><div class="postlist-empty-icon">📭</div><p>' + (lang==='en'?emptyEn:emptyZh) + '</p></div>';
            }
            data.keys.forEach(function(key, idx) {
                var group = data.groups[key];
                var opacity = '0.48';
                html += '<div class="archive-year-card" style="background:rgba(255,255,255,' + opacity + ')">';
                html += '<div class="archive-year-header">';
                html += '<span class="archive-year-num">' + formatHeader(key, mode, group.length) + '</span>';
                html += '</div>';
                html += '<div class="archive-post-list">';
                group.sort(function(a,b){ return b.date.localeCompare(a.date); });
                group.forEach(function(p) {
                    var d = p.date.substring(5);
                    var icon = p.title.indexOf('[自学]') !== -1 ? '📝' : (p.title.indexOf('[科研]') !== -1 ? '🔬' : '');
                    html += '<a href="' + p.url + '" class="archive-post-row">';
                    html += '<span class="archive-post-date">' + d + '</span>';
                    html += '<span class="archive-post-sep">·</span>';
                    if (icon) html += '<span class="archive-post-icon">' + icon + '</span>';
                    html += '<span class="archive-post-title">' + p.title + '</span>';
                    if (p.tags) p.tags.forEach(function(t) {
                        html += '<span class="archive-post-tag">#' + t + '</span>';
                    });
                    html += '</a>';
                });
                html += '</div></div>';
            });
            document.getElementById('archiveContent').innerHTML = html;
            
            var cards = document.querySelectorAll('.archive-year-card');
            cards.forEach(function(c) { c.classList.add('reveal-init'); });
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            cards.forEach(function(c) { observer.observe(c); });
        }

        document.getElementById('archiveNav').addEventListener('click', function(e) {
            var item = e.target.closest('.archive-nav-item');
            if (!item) return;
            document.querySelectorAll('.archive-nav-item').forEach(function(el) { el.classList.remove('active'); });
            item.classList.add('active');
            mode = item.getAttribute('data-mode');
            render();
        });

        render();
    })();

<button class="theme-toggle lang-toggle" id="langToggle" title="切换语言" aria-label="切换语言" style="bottom:82px">
    <span id="langLabel">中</span>
</button>
<script>
(function() {
    var btn = document.getElementById('themeToggle');
    var sun = document.getElementById('iconSun');
    var moon = document.getElementById('iconMoon');
    var html = document.documentElement;

    function setTheme(t) {
        html.setAttribute('data-theme', t);
        sun.style.display = t === 'dark' ? 'none' : '';
        moon.style.display = t === 'dark' ? '' : 'none';
        localStorage.setItem('theme', t);
    }
    var saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);
    btn.addEventListener('click', function() {
        setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
})();


(function() {
    var btn = document.getElementById('langToggle');
    var label = document.getElementById('langLabel');
    if (!btn) return;
    var lang = localStorage.getItem('lang') || 'en';

    function setLang(l) {
        lang = l;
        label.textContent = l === 'zh' ? '中' : 'EN';
        localStorage.setItem('lang', l);
        document.querySelectorAll('[data-zh]').forEach(function(el) {
            var t = el.getAttribute('data-' + l);
            if (t !== null) el.textContent = t;
        });
        document.querySelectorAll('[data-zh-placeholder]').forEach(function(el) {
            var t = el.getAttribute('data-' + l + '-placeholder');
            if (t !== null) el.placeholder = t;
        });
    }
    setLang(lang);
    btn.addEventListener('click', function() { setLang(lang === 'zh' ? 'en' : 'zh'); });
})();
</script>

</body>
</html>
