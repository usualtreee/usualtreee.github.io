    <script>
    (function() {
        var NET_ID = '5122782239';
        var API = 'https://api.injahow.cn/meting/?server=netease&type=playlist&id=' + NET_ID;
        var audio = new Audio();
        var playlist = [];
        var currentIndex = 0;
        var playMode = 0; 
        var playing = false;

        var els = {
            loading: document.querySelector('.music-loading'),
            main: document.querySelector('.music-main'),
            cover: document.querySelector('.music-cover'),
            name: document.querySelector('.music-track-name'),
            artist: document.querySelector('.music-track-artist'),
            progressWrap: document.getElementById('progressBarWrap'),
            progressFill: document.getElementById('progressFill'),
            progressThumb: document.getElementById('progressThumb'),
            btnPlay: document.getElementById('btnPlay'),
            iconPlay: document.getElementById('iconPlay'),
            iconPause: document.getElementById('iconPause'),
            btnPrev: document.getElementById('btnPrev'),
            btnNext: document.getElementById('btnNext'),
            btnMode: document.getElementById('btnMode'),
            iconListLoop: document.getElementById('iconListLoop'),
            iconSingleLoop: document.getElementById('iconSingleLoop'),
            iconShuffle: document.getElementById('iconShuffle'),
            btnVolume: document.getElementById('btnVolume'),
            volPopup: document.getElementById('volPopup'),
            volSlider: document.getElementById('volSlider'),
            btnList: document.getElementById('btnList'),
            playlist: document.getElementById('musicPlaylist')
        };

        
        fetch(API)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data || data.length === 0) {
                    els.loading.setAttribute('data-zh', '🎵 歌单为空');
                    els.loading.setAttribute('data-en', '🎵 Playlist empty');
                    els.loading.textContent = (localStorage.getItem('lang')!=='zh'?'🎵 Playlist empty':'🎵 歌单为空');
                    return;
                }
                playlist = data;
                els.loading.style.display = 'none';
                els.main.style.display = 'flex';
                renderPlaylist();
                loadTrack(0);
            })
            .catch(function() {
                els.loading.setAttribute('data-zh', '🎵 音乐加载失败');
                els.loading.setAttribute('data-en', '🎵 Failed to load');
                els.loading.textContent = (localStorage.getItem('lang')!=='zh'?'🎵 Failed to load':'🎵 音乐加载失败');
            });

        function loadTrack(i) {
            currentIndex = i;
            var track = playlist[i];
            els.name.textContent = track.name || '未知';
            els.artist.textContent = track.artist || '未知';
            els.cover.src = (track.pic && track.pic.indexOf('http') === 0) ? track.pic : '';
            els.cover.style.display = els.cover.src ? '' : 'none';
            audio.src = track.url || '';
            els.progressFill.style.width = '0%';
            els.progressThumb.style.left = '0%';
            updatePlaylistActive();
            if (playing) {
                audio.play().catch(function(){});
            }
        }

        function renderPlaylist() {
            var html = '';
            playlist.forEach(function(t, i) {
                html += '<div class="music-pl-item" data-i="' + i + '">' +
                    '<span class="music-pl-num">' + (i + 1) + '</span>' +
                    '<span class="music-pl-name">' + (t.name || '?') + '</span>' +
                    '<span class="music-pl-artist">' + (t.artist || '?') + '</span>' +
                '</div>';
            });
            els.playlist.innerHTML = html;
        }

        function updatePlaylistActive() {
            var items = els.playlist.querySelectorAll('.music-pl-item');
            items.forEach(function(el, i) {
                el.classList.toggle('active', i === currentIndex);
            });
        }

        
        function setPlaying(s) {
            playing = s;
            els.iconPlay.style.display = s ? 'none' : '';
            els.iconPause.style.display = s ? '' : 'none';
        }
        els.btnPlay.addEventListener('click', function() {
            if (playing) { audio.pause(); setPlaying(false); }
            else { audio.play().catch(function(){}); setPlaying(true); }
        });

        
        var dragging = false;
        els.progressWrap.addEventListener('mousedown', function(e) {
            dragging = true;
            seek(e);
        });
        document.addEventListener('mousemove', function(e) { if (dragging) seek(e); });
        document.addEventListener('mouseup', function() { dragging = false; });
        els.progressWrap.addEventListener('click', function(e) { seek(e); });

        function seek(e) {
            var rect = els.progressWrap.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            els.progressFill.style.width = (pct * 100) + '%';
            els.progressThumb.style.left = (pct * 100) + '%';
            if (audio.duration) audio.currentTime = pct * audio.duration;
        }

        audio.addEventListener('timeupdate', function() {
            if (!dragging && audio.duration) {
                var pct = (audio.currentTime / audio.duration) * 100;
                els.progressFill.style.width = pct + '%';
                els.progressThumb.style.left = pct + '%';
            }
        });

        audio.addEventListener('ended', function() {
            if (playMode === 1) { audio.currentTime = 0; audio.play(); return; }
            if (playMode === 2) { loadTrack(randIndex()); audio.play(); return; }
            
            var next = currentIndex + 1;
            if (next >= playlist.length) next = 0;
            loadTrack(next);
            if (playing) audio.play();
        });

        function randIndex() {
            var i; do { i = Math.floor(Math.random() * playlist.length); } while (i === currentIndex && playlist.length > 1);
            return i;
        }

        
        els.btnPrev.addEventListener('click', function() {
            var prev = currentIndex - 1; if (prev < 0) prev = playlist.length - 1;
            loadTrack(prev);
            if (playing) audio.play();
        });
        els.btnNext.addEventListener('click', function() {
            var next = currentIndex + 1; if (next >= playlist.length) next = 0;
            loadTrack(next);
            if (playing) audio.play();
        });

        
        function updateModeUI() {
            els.iconListLoop.style.display = playMode === 0 ? '' : 'none';
            els.iconSingleLoop.style.display = playMode === 1 ? '' : 'none';
            els.iconShuffle.style.display = playMode === 2 ? '' : 'none';
            els.btnMode.classList.toggle('active', playMode !== 0);
        }
        els.btnMode.addEventListener('click', function() {
            playMode = (playMode + 1) % 3;
            updateModeUI();
        });

        
        els.btnVolume.addEventListener('click', function(e) {
            e.stopPropagation();
            var show = els.volPopup.style.display === 'block';
            els.volPopup.style.display = show ? 'none' : 'block';
        });
        els.volSlider.addEventListener('input', function() {
            audio.volume = this.value / 100;
        });
        document.addEventListener('click', function(e) {
            els.volPopup.style.display = 'none';
            if (!e.target.closest('#musicPlaylist') && !e.target.closest('#btnList')) {
                els.playlist.style.display = 'none';
            }
        });

        
        els.btnList.addEventListener('click', function(e) {
            e.stopPropagation();
            var show = els.playlist.style.display === 'block';
            els.playlist.style.display = show ? 'none' : 'block';
        });

        
        els.playlist.addEventListener('click', function(e) {
            var item = e.target.closest('.music-pl-item');
            if (!item) return;
            var i = parseInt(item.getAttribute('data-i'));
            loadTrack(i);
            if (playing) audio.play(); else { setPlaying(true); audio.play(); }
        });

        audio.volume = 0.5;
    })();

    
    (function() {
        var canvas = document.getElementById('clickCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var particles = [];
        var lightColors = ['#81c784','#a5d6a7','#c8e6c9','#fb7299','#f8bbd0','#fff176','#ffcc80'];
        var darkColors = ['#69f0ae','#00e676','#ffeb3b','#ff6e40','#ff4081','#40c4ff','#ffab40','#ffffff'];

        function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        function spawn(x, y) {
            var dark = isDark();
            var colors = dark ? darkColors : lightColors;
            var count = dark ? 30 : 28;
            count += Math.floor(Math.random() * (dark ? 20 : 16));
            for (var i = 0; i < count; i++) {
                var angle = Math.random() * Math.PI * 2;
                var speed = dark ? (2.0 + Math.random() * 0.8) : (2.5 + Math.random() * 5);
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - (dark ? 1.2 : 2),
                    life: 1,
                    decay: dark ? (0.003 + Math.random() * 0.005) : (0.012 + Math.random() * 0.018),
                    size: dark ? (2 + Math.random() * 4) : (3 + Math.random() * 5),
                    color: colors[Math.floor(Math.random() * colors.length)],
                    isRibbon: !dark && Math.random() < 0.25,
                    ribbonWave: Math.random() * 2 - 1
                });
            }
        }

        
        var rockets = [];
        var animating = false;
        var clickTimes = [];

        document.addEventListener('click', function(e) {
            if (e.target.closest('.card') || e.target.closest('button') || e.target.closest('a') || e.target.closest('nav')) return;
            spawn(e.clientX, e.clientY);
            if (!animating) { animating = true; requestAnimationFrame(tick); }

            if (!isDark()) return;
            var now = Date.now();
            clickTimes.push(now);
            while (clickTimes.length > 0 && clickTimes[0] < now - 10000) clickTimes.shift();
            if (clickTimes.length >= 10) {
                clickTimes = [];
                grandFinale();
                spawnScenery();
            }
        });

        
        var scenery = [];
        var sceneryActive = false;
        var sceneryLocked = false;
        var sceneryFadeOut = false;
        var sceneryTimer = 0;

        function spawnScenery() {
            if (sceneryActive) return;
            sceneryActive = true;
            sceneryLocked = false;
            sceneryFadeOut = false;
            sceneryTimer = 0;
            scenery = [];
            var h = canvas.height;
            var w = canvas.width;
            var groundY = h - 5; 
            
            scenery.push({type:'mountain', x: w*0.22, y: groundY, alpha:0, layer:'far'});
            scenery.push({type:'mountain', x: w*0.75, y: groundY, alpha:0, layer:'far'});
            
            scenery.push({type:'pagoda', x: w*0.07, y: groundY, alpha:0, layer:'mid'});
            
            scenery.push({type:'palace', x: w*0.28, y: groundY, alpha:0, layer:'mid'});
            
            scenery.push({type:'bridge', x: w*0.52, y: groundY, alpha:0, layer:'mid'});
            
            scenery.push({type:'pavilion', x: w*0.87, y: groundY, alpha:0, layer:'mid'});
            
            for (var lo = 0; lo < 5; lo++) {
                scenery.push({type:'lotus', x: w*(0.12+lo*0.18), y: groundY-1+Math.random()*3, alpha:0, sway: Math.random()*Math.PI*2, layer:'water'});
            }
            
            for (var l = 0; l < 6; l++) {
                scenery.push({type:'lantern', x: w*(0.05+l*0.17), y: groundY-55-Math.random()*50, alpha:0, swing: Math.random()*Math.PI*2, layer:'near'});
            }
        }

        function drawScenery(ctx) {
            var h = canvas.height, w = canvas.width;

            
            var allDone = true;
            for (var s = 0; s < scenery.length; s++) {
                var sc = scenery[s];
                if (sc.alpha < 1 && !sceneryLocked) sc.alpha += 0.04;
                if (sc.alpha >= 1) sc.alpha = 1;
                if (sc.alpha < 1) allDone = false;
            }
            if (allDone && !sceneryLocked) { sceneryLocked = true; sceneryTimer = 0; }
            if (sceneryLocked) sceneryTimer++;
            if (sceneryTimer > 500) sceneryFadeOut = true;
            if (sceneryFadeOut) {
                var anyVisible = false;

        document.querySelectorAll('[data-zh-placeholder]').forEach(function(el) {
            var t = el.getAttribute('data-' + l + '-placeholder');
            if (t !== null) el.placeholder = t;
        });
    }
    setLang(lang);
    btn.addEventListener('click', function() { setLang(lang === 'zh' ? 'en' : 'zh'); });
})();
</script>

</body>
</html>
